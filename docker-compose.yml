# Docker Compose version omitted (Compose v2+)

services:
  db:
    image: postgres:13
    container_name: jobportal_db
    environment:
      POSTGRES_USER: jobuser
      POSTGRES_PASSWORD: jobpass
      POSTGRES_DB: jobportal
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./JobPortal.server
    container_name: jobportal_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://jobuser:jobpass@db:5432/jobportal
      # Add any additional env vars required by the app (e.g., JWT secret)
      SECRET_KEY: b3d11b3ffbc96c73df89abdf02970a04dae7a467f33333333333333333333333
    ports:
      - "8000:8000"
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./JobPortal.server:/workspace

  frontend:
    build: ./JobPortal.client
    container_name: jobportal_frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    # For hot‑reloading during development, mount the source code
    volumes:
      - ./JobPortal.client:/app

volumes:
  db_data:
